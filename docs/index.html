<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ton VPN sur iPhone — tutoriel</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f1220; color: #f4f5fb;
      display: flex; flex-direction: column; align-items: center;
      padding: 2rem 1.25rem 3rem; text-align: center;
    }
    .lock { font-size: 3.5rem; line-height: 1; margin-bottom: .5rem; }
    h1 { font-size: clamp(1.6rem, 6vw, 2.4rem); margin: .2rem 0 .1rem; }
    .sub { font-size: 1.05rem; opacity: .8; margin: 0 0 1.6rem; }
    .card {
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px; padding: 1.5rem 1.25rem; max-width: 34rem; width: 100%;
    }
    p { line-height: 1.55; opacity: .9; }
    .btn {
      display: inline-block; margin: 1rem .4rem .3rem; padding: .95rem 1.6rem;
      background: #4f7cff; color: #fff; text-decoration: none; font-weight: 700;
      border-radius: 999px; font-size: 1.05rem;
    }
    .btn.secondary { background: rgba(255,255,255,.12); }
    .btn:active { transform: translateY(1px); }
    .viewer { width: 100%; max-width: 60rem; margin-top: 1.6rem; }
    .viewer embed { width: 100%; height: 78vh; border: 1px solid rgba(255,255,255,.12); border-radius: 14px; background: #fff; }
    .hint { font-size: .85rem; opacity: .6; margin-top: 1.2rem; }
    @media (max-width: 640px) { .viewer { display: none; } }
  </style>
</head>
<body>
  <div class="lock">🔒</div>
  <h1>Ton VPN sur iPhone</h1>
  <p class="sub">Salut Charlotte&nbsp;! 👋 Le guide pas à pas.</p>

  <div class="card">
    <p>Ce tutoriel t'installe le VPN sur ton iPhone, en <strong>5 minutes</strong>, sans compétence technique. Ouvre-le et suis les écrans.</p>
    <a class="btn" href="./tuto-vpn-iphone.pdf">📄 Ouvrir le tutoriel</a>
    <a class="btn secondary" href="./tuto-vpn-iphone.pdf" download>⬇️ Télécharger</a>
  </div>

  <div class="viewer">
    <embed src="./tuto-vpn-iphone.pdf" type="application/pdf">
  </div>

  <p class="hint">Sur iPhone : appuie sur « Ouvrir le tutoriel », puis fais défiler.</p>
</body>
</html>
